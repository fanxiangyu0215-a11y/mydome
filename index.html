        const getDefaultApiBaseUrl = () => ""

        const normalizeBaseUrl = value => {
          const raw = String(value || "").trim()
          if (!raw) return ""
          const withProtocol = /^[a-zA-Z][a-zA-Z\d+\-.]*:\/\//.test(raw) ? raw : `http://${raw}`

          const input = document.getElementById("imt-api-base-input")
          const inputValue = input ? input.value : ""
          return normalizeBaseUrl(inputValue || window.__IMT_API_BASE_URL__ || localStorage.getItem(storageKey) || getDefaultApiBaseUrl())
        }

          if (!baseUrl || window.location.protocol !== "https:") return null

          if (typeof input !== "string") return input

          if (input.startsWith("/api/")) return buildApiProxyUrl(input) || (baseUrl ? `${baseUrl}${input}` : input)

          try {
            const parsed = new URL(input, window.location.href)
            if (parsed.pathname.startsWith("/api/") && parsed.origin === window.location.origin) {
              const path = `${parsed.pathname}${parsed.search}${parsed.hash}`

            }

          const withProxyHeader = requestInit => {
            if (!apiBaseUrl || window.location.protocol !== "https:") return requestInit
            const nextInit = Object.assign({}, requestInit || {})
            nextInit.headers = new Headers(nextInit.headers || {})
            nextInit.headers.set("X-Imt-Api-Origin", apiBaseUrl)

          }

            return originalFetch.call(this, rewriteApiUrl(input), withProxyHeader(init))
          }

    <script>
      ;(() => {
        const panel = document.getElementById("imt-api-base-panel")
        const input = document.getElementById("imt-api-base-input")
        const clear = document.getElementById("imt-api-base-clear")
        const status = document.getElementById("imt-api-base-status")
        if (!panel || !input || !clear || !status) return

        const showStatus = text => {
          status.textContent = text
          window.clearTimeout(showStatus.timer)
          showStatus.timer = window.setTimeout(() => {
            status.textContent = ""
          }, 1800)
        }

        input.value = window.__IMT_GET_API_BASE_URL__ ? window.__IMT_GET_API_BASE_URL__() : ""

        input.addEventListener("input", () => {
          if (window.__IMT_SET_API_BASE_URL__) window.__IMT_SET_API_BASE_URL__(input.value)
        })

        clear.addEventListener("click", () => {
          input.value = window.__IMT_SET_API_BASE_URL__ ? window.__IMT_SET_API_BASE_URL__("") : ""
          showStatus("已清空")
        })

        const mountPanel = () => {
          const queryContainer = document.querySelector(".query-container")
          if (!panel || !queryContainer || queryContainer.firstElementChild === panel) return
          queryContainer.insertBefore(panel, queryContainer.firstElementChild)
        }

        document.addEventListener("DOMContentLoaded", mountPanel)
        window.addEventListener("load", mountPanel)
        const mountTimer = window.setInterval(mountPanel, 200)
        window.setTimeout(() => window.clearInterval(mountTimer), 5000)
      })()
    </script>

          String(hex || "")
            .split("")
            .map(ch => parseInt(ch, 16).toString(2).padStart(4, "0"))
            .join("")

        const buildDotRects = bitString => {
          let rects = ""
          for (let i = 0; i < bitString.length; i += 1) {
            if (bitString[i] !== "1") continue
            const x = 6 + (i % 16) * 3
            const y = 6 + Math.floor(i / 16) * 3
            rects += `<rect x='${x}' y='${y}' width='2' height='2'/>`
            rects += `<rect x='${300 - x}' y='${6 + y}' width='2' height='2'/>`
          }
          return rects
        }

        const clampByte = value => {
          if (value < 0) return 0
          if (value > 255) return 255
          return value | 0
        }

        const crc4FromBits8 = bits8 => {
          const bits = String(bits8 || "")
            .replace(/[^01]/g, "")
            .slice(0, 8)
            .padEnd(8, "0")
          const n0 = Number.parseInt(bits.slice(0, 4), 2)
          const n1 = Number.parseInt(bits.slice(4, 8), 2)
          const crc = (n0 ^ n1 ^ 0xa) & 0xf
          return crc.toString(2).padStart(4, "0")
        }

        const makeSignalPeriods = bits => {
          const xPeriods = []
          const yPeriods = []
          for (let i = 0; i < 8; i += 1) {
            const pair = SIGNAL_PAIR_X[i]
            xPeriods.push(bits[i] === "1" ? pair[1] : pair[0])
          }
          for (let i = 0; i < 8; i += 1) {
            const pair = SIGNAL_PAIR_Y[i]
            yPeriods.push(bits[i] === "1" ? pair[1] : pair[0])
          }
          return { xPeriods, yPeriods }
        }

        const drawSignalWatermark = code => {
          ensureContainers()
          if (!signalCanvas) return
          const bits = toBitString(shortHash(String(code || ""))).slice(0, 8).padEnd(8, "0")
          const signalHex = Number.parseInt(bits, 2).toString(16).padStart(2, "0")
          const { xPeriods, yPeriods } = makeSignalPeriods(bits)

          const width = Math.max(320, Math.floor(window.innerWidth || 0))
          const height = Math.max(240, Math.floor(window.innerHeight || 0))
          if (signalCanvas.width !== width || signalCanvas.height !== height) {
            signalCanvas.width = width
            signalCanvas.height = height
          }

          const ctx = signalCanvas.getContext("2d", { alpha: true })
          if (!ctx) return

          const xWave = new Float32Array(width)
          const yWave = new Float32Array(height)
          for (let x = 0; x < width; x += 1) {
            let v = 0
            for (let i = 0; i < xPeriods.length; i += 1) {
              const p = xPeriods[i]
              v += Math.sin((Math.PI * 2 * x) / p) + 0.45 * Math.sin((Math.PI * 4 * x) / p)
            }
            xWave[x] = v / xPeriods.length
          }
          for (let y = 0; y < height; y += 1) {
            let v = 0
            for (let i = 0; i < yPeriods.length; i += 1) {
              const p = yPeriods[i]
              v += Math.cos((Math.PI * 2 * y) / p) + 0.45 * Math.cos((Math.PI * 4 * y) / p)
            }
            yWave[y] = v / yPeriods.length
          }

          const imageData = ctx.createImageData(width, height)
          const data = imageData.data
          const amplitude = 24
          const alpha = 11
          let p = 0
          for (let y = 0; y < height; y += 1) {
            const yv = yWave[y]
            for (let x = 0; x < width; x += 1) {
              const s = (xWave[x] + yv) * amplitude
              data[p] = clampByte(128 - s)
              data[p + 1] = 128
              data[p + 2] = clampByte(128 + s)
              data[p + 3] = alpha
              p += 4
            }
          }

          ctx.putImageData(imageData, 0, 0)
          signalCanvas.setAttribute("data-signal-bits", bits)
          signalCanvas.setAttribute("data-signal-hex", signalHex)
          document.documentElement.setAttribute("data-imt-signal-hex", signalHex)
          window.__IMT_QUERY_SIGNAL_HEX = signalHex
          lastSignalCode = String(code || "")
        }

        const drawFastSignalWatermark = code => {
          ensureContainers()
          if (!fastSignalCanvas) return

          const payloadBits = toBitString(shortHash(String(code || ""))).slice(0, 8).padEnd(8, "0")
          const payloadHex = Number.parseInt(payloadBits, 2).toString(16).padStart(2, "0")
          const fullBits = FAST_MARKER_SYNC + payloadBits + crc4FromBits8(payloadBits)

          const width = Math.max(320, Math.floor(window.innerWidth || 0))
          const height = Math.max(240, Math.floor(window.innerHeight || 0))
          if (fastSignalCanvas.width !== width || fastSignalCanvas.height !== height) {
            fastSignalCanvas.width = width
            fastSignalCanvas.height = height
          }

          const tileWidth = FAST_MARKER_COLS * FAST_MARKER_CELL
          const tileHeight = FAST_MARKER_ROWS * FAST_MARKER_CELL
          const tile = document.createElement("canvas")
          tile.width = tileWidth
          tile.height = tileHeight
          const tctx = tile.getContext("2d", { alpha: true })
          if (!tctx) return

          const delta = 18
          const alpha = 10
          const tileData = tctx.createImageData(tileWidth, tileHeight)
          const arr = tileData.data

          for (let by = 0; by < FAST_MARKER_ROWS; by += 1) {
            for (let bx = 0; bx < FAST_MARKER_COLS; bx += 1) {
              const bitIndex = by * FAST_MARKER_COLS + bx
              const bitValue = fullBits[bitIndex] === "1" ? 1 : -1
              const x0 = bx * FAST_MARKER_CELL
              const y0 = by * FAST_MARKER_CELL
              for (let y = 0; y < FAST_MARKER_CELL; y += 1) {
                for (let x = 0; x < FAST_MARKER_CELL; x += 1) {
                  const checker = ((x + y) & 1) === 0 ? 1 : -1
                  const m = bitValue * checker
                  const px = x0 + x
                  const py = y0 + y
                  const p = (py * tileWidth + px) * 4
                  arr[p] = clampByte(128 - m * delta)
                  arr[p + 1] = 128
                  arr[p + 2] = clampByte(128 + m * delta)
                  arr[p + 3] = alpha
                }
              }
            }
          }
          tctx.putImageData(tileData, 0, 0)

          const ctx = fastSignalCanvas.getContext("2d", { alpha: true })
          if (!ctx) return
          ctx.clearRect(0, 0, width, height)
          const pattern = ctx.createPattern(tile, "repeat")
          if (!pattern) return
          ctx.fillStyle = pattern
          ctx.fillRect(0, 0, width, height)

          fastSignalCanvas.setAttribute("data-fast-sync", FAST_MARKER_SYNC)
          fastSignalCanvas.setAttribute("data-fast-bits", fullBits)
          fastSignalCanvas.setAttribute("data-fast-payload-bits", payloadBits)
          fastSignalCanvas.setAttribute("data-fast-payload-hex", payloadHex)
          document.documentElement.setAttribute("data-imt-fast-hex", payloadHex)
          window.__IMT_QUERY_FAST_HEX = payloadHex
          lastFastCode = String(code || "")
        }

        const createForensicSvg = code => {
          const safe = escapeXml(code)
          const a = safe.slice(0, 18) || "imt"
          const b = safe.slice(18, 36) || "query"
          const c = safe.slice(36, 54) || "wm"
          const bits = toBitString(shortHash(code))
          const dots = buildDotRects(bits)
          return `
            <svg xmlns='http://www.w3.org/2000/svg' width='320' height='240' viewBox='0 0 320 240'>
              <g transform='rotate(-23 160 120)'>
                <text x='12' y='78' fill='rgba(255,0,120,0.028)' font-size='11' font-family='Arial, sans-serif' letter-spacing='1.4'>${a}</text>
                <text x='102' y='122' fill='rgba(0,120,255,0.026)' font-size='11' font-family='Arial, sans-serif' letter-spacing='1.4'>${b}</text>
                <text x='42' y='168' fill='rgba(16,16,16,0.02)' font-size='10' font-family='Arial, sans-serif' letter-spacing='1.2'>${c}</text>
              </g>
              <g fill='rgba(0,0,0,0.032)'>${dots}</g>
            </svg>
          `
        }

        const normalizeRemark = value => {
          if (value === null || value === undefined) return ""
          const text = String(value).replace(/\s+/g, " ").trim()
          if (!text) return ""
          if (IGNORED_VALUES.has(text)) return ""
          if (text.length > 40) return ""
          return text
        }

        const pickTopRemark = remarks => {
          const counter = Object.create(null)
          let best = ""
          let bestCount = 0
          for (let i = 0; i < remarks.length; i += 1) {
            const item = normalizeRemark(remarks[i])
            if (!item) continue
            counter[item] = (counter[item] || 0) + 1
            if (counter[item] > bestCount) {
              best = item
              bestCount = counter[item]
            }
          }
          return best
        }

        const collectRemarksFromPayload = payload => {
          const result = []
          const queue = [payload]
          const visited = typeof WeakSet === "function" ? new WeakSet() : null
          let scanned = 0

          while (queue.length > 0 && scanned < MAX_SCAN_NODES) {
            scanned += 1
            const node = queue.pop()
            if (!node || typeof node !== "object") continue
            if (visited) {
              if (visited.has(node)) continue
              visited.add(node)
            }

            if (Array.isArray(node)) {
              const limit = Math.min(node.length, 300)
              for (let i = 0; i < limit; i += 1) queue.push(node[i])
              continue
            }

            const keys = Object.keys(node)
            for (let i = 0; i < keys.length; i += 1) {
              const key = keys[i]
              const value = node[key]
              if (KEY_PATTERN.test(key)) {
                const remark = normalizeRemark(value)
                if (remark) result.push(remark)
              }
              if (value && typeof value === "object") queue.push(value)
            }
          }

          return result
        }

        const applyWatermark = (rawText, source) => {
          const text = normalizeRemark(rawText) || "查询"
          if (text === currentText) return
          currentText = text
          ensureContainers()

          const safeText = escapeXml(text)
          const svg = `
            <svg xmlns='http://www.w3.org/2000/svg' width='360' height='220' viewBox='0 0 360 220'>
              <g transform='rotate(-24 180 110)'>
                <text x='18' y='110' fill='rgba(20,20,20,0.14)' font-size='26' font-family='Arial, sans-serif'>${safeText}</text>
                <text x='180' y='180' fill='rgba(20,20,20,0.10)' font-size='24' font-family='Arial, sans-serif'>${safeText}</text>
              </g>
            </svg>
          `

          visibleContainer.style.backgroundImage = `url("data:image/svg+xml;utf8,${encodeURIComponent(svg)}")`

          const payload = {
            text,
            source: source || "",
            at: new Date().toISOString(),
            href: location.href
          }
          const encoded = toBase64Utf8(JSON.stringify(payload))
          darkContainer.textContent = encoded
          darkContainer.setAttribute("data-watermark", encoded)
          document.documentElement.setAttribute("data-imt-dark-watermark", encoded)
          document.body.setAttribute("data-imt-dark-watermark", encoded.slice(0, 128))

          const forensicCode = `${text}|${payload.at}|${shortHash(encoded)}`
          const forensicSvg = createForensicSvg(forensicCode)
          forensicContainer.style.backgroundImage = `url("data:image/svg+xml;utf8,${encodeURIComponent(forensicSvg)}")`
          forensicContainer.setAttribute("data-forensic-hash", shortHash(forensicCode))
          document.documentElement.setAttribute("data-imt-forensic-hash", shortHash(forensicCode))
          drawSignalWatermark(forensicCode)
          drawFastSignalWatermark(forensicCode)
        }

        const inspectPayload = (payload, source) => {
          const metrics = extractMetricsFromPayload(payload)
          if (metrics) latestPayloadMetrics = metrics
          const remarks = collectRemarksFromPayload(payload)
          if (!remarks.length) return
          const topRemark = pickTopRemark(remarks)
          if (topRemark) applyWatermark(topRemark, source)
        }

        const runDemoWatermark = remark => {
          const name = normalizeRemark(remark) || "张三"
          const mockPayload = {
            code: 0,
            data: [
              { remark: name },
              { 备注: name },
              { note: name },
              { remark: "李四" }
            ]
          }
          inspectPayload(mockPayload, "demo-mock")
          return name
        }

        const safeJsonParse = text => {
          if (!text || typeof text !== "string") return null
          try {
            return JSON.parse(text)
          } catch (e) {
            return null
          }
        }

        const hookFetch = () => {
          if (window.__IMT_QUERY_WATERMARK_FETCH_HOOKED__) return
          window.__IMT_QUERY_WATERMARK_FETCH_HOOKED__ = true

          const rawFetch = window.fetch
          if (typeof rawFetch !== "function") return

          window.fetch = function (...args) {
            return rawFetch.apply(this, args).then(response => {
              try {
                const contentType = String(response.headers.get("content-type") || "")
                const isJson =
                  contentType.includes("application/json") ||
                  contentType.includes("+json") ||
                  contentType.includes("text/json")
                if (isJson) {
                  const cloned = response.clone()
                  cloned
                    .text()
                    .then(text => {
                      const payload = safeJsonParse(text)
                      if (payload) inspectPayload(payload, response.url || "fetch")
                      scheduleMetricsRefresh()
                    })
                    .catch(() => {})
                }
              } catch (e) {}
              return response
            })
          }
        }

        const hookXHR = () => {
          if (window.__IMT_QUERY_WATERMARK_XHR_HOOKED__) return
          window.__IMT_QUERY_WATERMARK_XHR_HOOKED__ = true

          const rawOpen = XMLHttpRequest.prototype.open
          const rawSend = XMLHttpRequest.prototype.send

          XMLHttpRequest.prototype.open = function (method, url) {
            this.__imtQueryUrl = url
            return rawOpen.apply(this, arguments)
          }

          XMLHttpRequest.prototype.send = function () {
            this.addEventListener(
              "loadend",
              function () {
                try {
                  const contentType = String(this.getResponseHeader("content-type") || "")
                  const isJson =
                    contentType.includes("application/json") ||
                    contentType.includes("+json") ||
                    contentType.includes("text/json")
                  if (!isJson) return
                  if (this.responseType && this.responseType !== "" && this.responseType !== "text") return
                  const payload = safeJsonParse(this.responseText)
                  if (payload) inspectPayload(payload, this.responseURL || this.__imtQueryUrl || "xhr")
                  scheduleMetricsRefresh()
                } catch (e) {}
              },
              { once: true }
            )
            return rawSend.apply(this, arguments)
          }
        }

        const scanRemarkFromTable = () => {
          const wrappers = document.querySelectorAll(".ant-table-wrapper")
          const remarks = []
          for (let i = 0; i < wrappers.length; i += 1) {
            const wrapper = wrappers[i]
            const heads = Array.from(wrapper.querySelectorAll(".ant-table-thead th"))
            const remarkColIndex = heads.findIndex(th =>
              String(th.textContent || "").replace(/\s+/g, "").includes("备注")
            )
            if (remarkColIndex < 0) continue

            const rows = Array.from(wrapper.querySelectorAll(".ant-table-tbody > tr"))
            for (let r = 0; r < rows.length; r += 1) {
              const row = rows[r]
              if (row.classList.contains("ant-table-placeholder")) continue
              const cells = row.querySelectorAll("td")
              if (!cells.length || remarkColIndex >= cells.length) continue
              const value = normalizeRemark(cells[remarkColIndex].textContent)
              if (value) remarks.push(value)
            }
          }
          if (!remarks.length) return
          const topRemark = pickTopRemark(remarks)
          if (topRemark) applyWatermark(topRemark, "dom-table")
        }

        const CATEGORY_MAP = {
          "741": "儿童套餐",
          "483": "豪华套餐",
          飞天MT: "儿童套餐"
        }
        const STATUS_TEXT_MAP = {
          unlocked: "已解锁",
          address: "填写地址",
          compose: "组合中",
          submit: "已提交",
          pendingPay: "已接单",
          pendingpay: "已接单",
          待支付: "已接单",
          待付款: "已接单",
          processing: "处理中",
          error: "异常",
          invalid: "失效",
          device: "设备异常",
          to_ship: "已完成",
          待提货: "已完成",
          canceled: "已取消",
          cancelled: "已取消"
        }
        const STATUS_FINAL_TEXT_SET = new Set([
          "已解锁",
          "填写地址",
          "组合中",
          "已提交",
          "已接单",
          "处理中",
          "异常",
          "失效",
          "设备异常",
          "已完成",
          "已取消",
          "未知"
        ])

        const normalizeStatusText = rawText => {
          const raw = String(rawText || "").replace(/\s+/g, "")
          const lower = raw.toLowerCase()
          if (STATUS_FINAL_TEXT_SET.has(raw)) return raw
          if (Object.prototype.hasOwnProperty.call(STATUS_TEXT_MAP, raw)) return STATUS_TEXT_MAP[raw]
          if (Object.prototype.hasOwnProperty.call(STATUS_TEXT_MAP, lower))
            return STATUS_TEXT_MAP[lower]
          return "未知"
        }

        const classifyStatusForMetrics = rawText => {
          const normalized = normalizeStatusText(rawText)
          if (normalized === "已取消") return "已取消"
          if (normalized === "已完成") return "已完成"
          if (normalized === "已接单") return "已接单"
          if (normalized === "待处理") return "待处理"
          return "未知"
        }

        const readNumericField = node => {
          if (!node || typeof node !== "object") return 0
          const keys = ["total", "totalCount", "count", "allCount"]
          let best = 0
          for (let i = 0; i < keys.length; i += 1) {
            const v = Number(node[keys[i]])
            if (Number.isFinite(v) && v > best) best = v
          }
          return best
        }

        const extractStatusValue = item => {
          if (!item || typeof item !== "object") return ""
          const fields = [
            "statusText",
            "status_name",
            "statusName",
            "status_desc",
            "statusDesc",
            "status",
            "orderStatus",
            "state"
          ]
          for (let i = 0; i < fields.length; i += 1) {
            const v = item[fields[i]]
            if (v !== undefined && v !== null && String(v).trim() !== "") return String(v)
          }
          return ""
        }

        const isOrderLikeRow = item => {
          if (!item || typeof item !== "object" || Array.isArray(item)) return false
          const status = extractStatusValue(item)
          if (!status) return false
          return (
            "phone" in item ||
            "orderId" in item ||
            "orderNo" in item ||
            "id" in item ||
            "created_at" in item ||
            "createdAt" in item
          )
        }

        const collectOrderRowsFromPayload = payload => {
          const queue = [payload]
          const visited = typeof WeakSet === "function" ? new WeakSet() : null
          let scanned = 0
          let bestRows = []

          while (queue.length > 0 && scanned < MAX_SCAN_NODES) {
            scanned += 1
            const node = queue.pop()
            if (!node || typeof node !== "object") continue
            if (visited) {
              if (visited.has(node)) continue
              visited.add(node)
            }

            if (Array.isArray(node)) {
              const sampleSize = Math.min(node.length, 40)
              let orderLike = 0
              for (let i = 0; i < sampleSize; i += 1) {
                if (isOrderLikeRow(node[i])) orderLike += 1
              }
              if (orderLike > 0 && node.length >= bestRows.length) bestRows = node

              const pushLimit = Math.min(node.length, 260)
              for (let i = 0; i < pushLimit; i += 1) {
                const child = node[i]
                if (child && typeof child === "object") queue.push(child)
              }
              continue
            }

            const keys = Object.keys(node)
            for (let i = 0; i < keys.length; i += 1) {
              const value = node[keys[i]]
              if (value && typeof value === "object") queue.push(value)
            }
          }

          return bestRows
        }

        const buildMetricsFromRows = rows => {
          let total = 0
          let pending = 0
          let delivering = 0
          let done = 0
          let canceled = 0
          const seen = new Set()

          for (let i = 0; i < rows.length; i += 1) {
            const item = rows[i]
            if (!item || typeof item !== "object" || Array.isArray(item)) continue
            const key =
              String(item.orderId || item.orderNo || item.id || "").trim() ||
              [
                item.phone || "",
                item.created_at || item.createdAt || "",
                extractStatusValue(item)
              ].join("|")
            if (key && seen.has(key)) continue
            if (key) seen.add(key)

            total += 1
            const statusText = classifyStatusForMetrics(extractStatusValue(item))
            if (statusText === "待处理") pending += 1
            else if (statusText === "已接单") delivering += 1
            else if (statusText === "已完成") done += 1
            else if (statusText === "已取消") canceled += 1
          }

          return { total, pending, delivering, done, canceled }
        }

        const extractMetricsFromPayload = payload => {
          const rows = collectOrderRowsFromPayload(payload)
          if (!rows || !rows.length) return null
          const metrics = buildMetricsFromRows(rows)
          const totalHint = Math.max(readNumericField(payload), readNumericField(payload && payload.data))
          if (totalHint > metrics.total) metrics.total = totalHint
          return metrics
        }

        const getPrimaryTableRows = wrapper => {
          const allRows = Array.from(wrapper.querySelectorAll(".ant-table-tbody > tr"))
          const rows = allRows.filter(
            row => !row.closest(".ant-table-fixed-left") && !row.closest(".ant-table-fixed-right")
          )
          const seen = new Set()
          const uniq = []
          for (let i = 0; i < rows.length; i += 1) {
            const row = rows[i]
            if (row.classList.contains("ant-table-placeholder")) continue
            const key =
              row.getAttribute("data-row-key") ||
              String(row.textContent || "").replace(/\s+/g, "").slice(0, 240)
            if (!key || seen.has(key)) continue
            seen.add(key)
            uniq.push(row)
          }
          return uniq
        }

        const getPrimaryHeaderCells = wrapper => {
          const mainHead = wrapper.querySelector(".ant-table-content .ant-table-thead")
          if (mainHead) return Array.from(mainHead.querySelectorAll("th"))
          return Array.from(wrapper.querySelectorAll(".ant-table-thead th")).filter(
            th => !th.closest(".ant-table-fixed-left") && !th.closest(".ant-table-fixed-right")
          )
        }

        const remapCategoryInTable = () => {
          const wrappers = Array.from(document.querySelectorAll(".ant-table-wrapper"))
          for (let i = 0; i < wrappers.length; i += 1) {
            const wrapper = wrappers[i]
            const heads = getPrimaryHeaderCells(wrapper)
            const categoryColIndex = heads.findIndex(th => {
              const text = String(th.textContent || "").replace(/\s+/g, "")
              return (
                text.includes("品类") ||
                text.includes("车型") ||
                text.includes("类型")
              )
            })
            if (categoryColIndex < 0) continue

            const rows = getPrimaryTableRows(wrapper)
            for (let r = 0; r < rows.length; r += 1) {
              const row = rows[r]
              const cells = row.querySelectorAll("td")
              if (!cells.length || categoryColIndex >= cells.length) continue
              const cell = cells[categoryColIndex]
              const raw = String(cell.textContent || "").replace(/\s+/g, "")
              if (!raw) continue
              const mapped = CATEGORY_MAP[raw]
              if (mapped && raw !== mapped) {
                cell.textContent = mapped
              }
            }
          }
        }

        const remapStatusInTable = () => {
          const wrappers = Array.from(document.querySelectorAll(".ant-table-wrapper"))
          for (let i = 0; i < wrappers.length; i += 1) {
            const wrapper = wrappers[i]
            const heads = getPrimaryHeaderCells(wrapper)
            const statusColIndex = heads.findIndex(th =>
              String(th.textContent || "").replace(/\s+/g, "").includes("状态")
            )
            if (statusColIndex < 0) continue

            const rows = getPrimaryTableRows(wrapper)
            for (let r = 0; r < rows.length; r += 1) {
              const row = rows[r]
              const cells = row.querySelectorAll("td")
              if (!cells.length || statusColIndex >= cells.length) continue
              const cell = cells[statusColIndex]
              const raw = String(cell.textContent || "").replace(/\s+/g, "")
              const mapped = normalizeStatusText(raw)
              if (mapped && raw !== mapped) {
                const styleHolder =
                  cell.querySelector(".status") ||
                  cell.querySelector(".ant-tag") ||
                  cell.querySelector(".ant-badge-status-text") ||
                  cell.querySelector("span")
                if (styleHolder) {
                  styleHolder.textContent = mapped
                } else {
                  cell.textContent = mapped
                }
              }
            }
          }
        }

        const getRemarkColumnIndex = wrapper => {
          const heads = getPrimaryHeaderCells(wrapper)
          return heads.findIndex(th =>
            String(th.textContent || "").replace(/\s+/g, "").includes("备注")
          )
        }

        const ensureRemarkFilterMenu = () => {
          if (remarkFilterMenu && document.body.contains(remarkFilterMenu)) return remarkFilterMenu
          const menu = document.createElement("div")
          menu.className = "imt-remark-filter-menu"
          menu.style.display = "none"
          menu.addEventListener("click", e => {
            const target = e.target && e.target.closest(".imt-remark-filter-item")
            if (!target) return
            currentRemarkFilter = target.getAttribute("data-value") || ""
            hideRemarkFilterMenu()
            renderRemarkFilterControls()
            applyRemarkFilterToTables()
          })
          document.body.appendChild(menu)
          remarkFilterMenu = menu
          return menu
        }

        const hideRemarkFilterMenu = () => {
          if (!remarkFilterMenu) return
          remarkFilterMenu.style.display = "none"
          remarkFilterMenu.innerHTML = ""
        }

        const renderRemarkFilterControls = () => {
          const wrappers = Array.from(document.querySelectorAll(".ant-table-wrapper"))
          for (let i = 0; i < wrappers.length; i += 1) {
            const wrapper = wrappers[i]
            const remarkColIndex = getRemarkColumnIndex(wrapper)
            if (remarkColIndex < 0) continue
            const heads = getPrimaryHeaderCells(wrapper)
            const remarkTh = heads[remarkColIndex]
            if (!remarkTh) continue

            let btn = remarkTh.querySelector(".imt-remark-filter-trigger")
            if (!btn) {
              btn = document.createElement("button")
              btn.type = "button"
              btn.className = "imt-remark-filter-trigger"
              btn.addEventListener("click", e => {
                e.preventDefault()
                e.stopPropagation()
                const menu = ensureRemarkFilterMenu()
                const rows = getPrimaryTableRows(wrapper)
                const values = []
                for (let r = 0; r < rows.length; r += 1) {
                  const cells = rows[r].querySelectorAll("td")
                  if (!cells.length || remarkColIndex >= cells.length) continue
                  const value = String(cells[remarkColIndex].textContent || "").trim()
                  if (value && !values.includes(value)) values.push(value)
                }
                values.sort((a, b) => a.localeCompare(b, "zh-Hans-CN"))

                const items = [{ label: "全部", value: "" }]
                for (let v = 0; v < values.length; v += 1) {
                  items.push({ label: values[v], value: values[v] })
                }

                menu.innerHTML = ""
                for (let m = 0; m < items.length; m += 1) {
                  const item = items[m]
                  const opt = document.createElement("button")
                  opt.type = "button"
                  opt.className = "imt-remark-filter-item"
                  if (item.value === currentRemarkFilter) opt.classList.add("active")
                  opt.setAttribute("data-value", item.value)
                  opt.textContent = item.label
                  menu.appendChild(opt)
                }

                const rect = btn.getBoundingClientRect()
                menu.style.left = `${Math.round(rect.left)}px`
                menu.style.top = `${Math.round(rect.bottom + 6)}px`
                menu.style.display = "block"
              })
              remarkTh.appendChild(btn)
            }
            btn.textContent = currentRemarkFilter ? `筛选:${currentRemarkFilter}` : "筛选"
          }
        }

        const applyRemarkFilterToTables = () => {
          const wrappers = Array.from(document.querySelectorAll(".ant-table-wrapper"))
          for (let i = 0; i < wrappers.length; i += 1) {
            const wrapper = wrappers[i]
            const remarkColIndex = getRemarkColumnIndex(wrapper)
            if (remarkColIndex < 0) continue

            const primaryRows = getPrimaryTableRows(wrapper)
            const rowVisibleMap = new Map()
            for (let r = 0; r < primaryRows.length; r += 1) {
              const row = primaryRows[r]
              const cells = row.querySelectorAll("td")
              if (!cells.length || remarkColIndex >= cells.length) continue
              const remarkText = String(cells[remarkColIndex].textContent || "").trim()
              const visible = !currentRemarkFilter || remarkText === currentRemarkFilter
              const key = row.getAttribute("data-row-key") || `idx-${r}`
              rowVisibleMap.set(key, visible)
              row.style.display = visible ? "" : "none"
            }

            const allRows = Array.from(wrapper.querySelectorAll(".ant-table-tbody > tr"))
            let fallbackIdx = 0
            for (let r = 0; r < allRows.length; r += 1) {
              const row = allRows[r]
              if (row.classList.contains("ant-table-placeholder")) continue
              const key = row.getAttribute("data-row-key") || `idx-${fallbackIdx}`
              fallbackIdx += 1
              const visible = rowVisibleMap.has(key) ? rowVisibleMap.get(key) : true
              row.style.display = visible ? "" : "none"
            }
          }
        }

        const remapPayMethodButtons = () => {
          const wrappers = Array.from(document.querySelectorAll(".ant-table-wrapper"))
          const payMapVersion = "5"
          const localIcons = {
            alipay: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%231677ff'/%3E%3Ctext x='32' y='41' text-anchor='middle' font-family='Arial,sans-serif' font-size='22' font-weight='700' fill='white'%3E%E6%94%AF%3C/text%3E%3C/svg%3E",
            wechat: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%2307c160'/%3E%3Ctext x='32' y='41' text-anchor='middle' font-family='Arial,sans-serif' font-size='22' font-weight='700' fill='white'%3E%E5%BE%AE%3C/text%3E%3C/svg%3E",
            unionpay: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23d71920'/%3E%3Ctext x='32' y='41' text-anchor='middle' font-family='Arial,sans-serif' font-size='22' font-weight='700' fill='white'%3E%E9%93%B6%3C/text%3E%3C/svg%3E",
            apple: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%231f2937'/%3E%3Ctext x='32' y='41' text-anchor='middle' font-family='Arial,sans-serif' font-size='20' font-weight='700' fill='white'%3EiOS%3C/text%3E%3C/svg%3E",
            android: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%233ddc84'/%3E%3Ctext x='32' y='40' text-anchor='middle' font-family='Arial,sans-serif' font-size='16' font-weight='700' fill='%23182730'%3EADR%3C/text%3E%3C/svg%3E"
          }
          const mapPay = [
            {
              keyword: "支付宝",
              name: "支付宝",
              iconKey: "alipay"
            },
            {
              keyword: "微信",
              name: "微信支付",
              iconKey: "wechat"
            },
            {
              keyword: "云闪付",
              name: "云闪付",
              iconKey: "unionpay"
            }
          ]
          const mapDevice = [
            {
              keyword: "apple",
              name: "Apple",
              iconKey: "apple"
            },
            {
              keyword: "ios",
              name: "iOS",
              iconKey: "apple"
            },
            {
              keyword: "iphone",
              name: "iPhone",
              iconKey: "apple"
            },
            {
              keyword: "苹果",
              name: "苹果",
              iconKey: "apple"
            },
            {
              keyword: "android",
              name: "Android",
              iconKey: "android"
            },
            {
              keyword: "安卓",
              name: "安卓",
              iconKey: "android"
            }
          ]

          for (let i = 0; i < wrappers.length; i += 1) {
            const wrapper = wrappers[i]
            const targets = wrapper.querySelectorAll("button, a")
            for (let j = 0; j < targets.length; j += 1) {
              const el = targets[j]
              if (el.dataset.imtPayMapped === payMapVersion) continue
              const text = String(el.textContent || "").trim()
              if (!text || !text.includes("链接")) continue

              const pay = mapPay.find(x => text.includes(x.keyword))
              if (!pay) continue
              const lower = text.toLowerCase()
              const device = mapDevice.find(x => lower.includes(x.keyword))

              const badge = document.createElement("span")
              badge.className = "imt-pay-badge"

              const payIcon = document.createElement("img")
              payIcon.className = "imt-pay-svg"
              payIcon.src = localIcons[pay.iconKey] || ""
              payIcon.alt = pay.name
              payIcon.loading = "lazy"
              badge.appendChild(payIcon)

              if (device) {
                const deviceIcon = document.createElement("img")
                deviceIcon.className = "imt-pay-svg"
                deviceIcon.src = localIcons[device.iconKey] || ""
                deviceIcon.alt = device.name
                deviceIcon.loading = "lazy"
                badge.appendChild(deviceIcon)
              }

              el.textContent = ""
              el.appendChild(badge)
              el.classList.add("imt-pay-icon-only")
              el.classList.remove(
                "link-button-alipay",
                "link-button-wechat",
                "link-button-unionpay",
                "query-channel-clicked"
              )
              el.style.setProperty("background", "transparent", "important")
              el.style.setProperty("border-color", "transparent", "important")
              el.style.setProperty("box-shadow", "none", "important")
              el.style.setProperty("padding", "0", "important")
              el.style.setProperty("min-width", "0", "important")
              el.style.setProperty("height", "auto", "important")
              el.dataset.imtPayMapped = payMapVersion
            }
          }
        }

        const removeQrcodeButtons = () => {
          const wrappers = Array.from(document.querySelectorAll(".ant-table-wrapper"))
          for (let i = 0; i < wrappers.length; i += 1) {
            const wrapper = wrappers[i]
            const actions = wrapper.querySelectorAll("button, a")
            for (let j = 0; j < actions.length; j += 1) {
              const el = actions[j]
              const text = String(el.textContent || "").replace(/\s+/g, "")
              if (text === "二维码") {
                const parent = el.parentElement
                el.remove()
                if (
                  parent &&
                  parent.classList.contains("table-actions") &&
                  !parent.querySelector("button, a")
                ) {
                  parent.remove()
                }
              }
            }
          }
        }

        const removeCurrentFilterHint = () => {
          const alerts = Array.from(document.querySelectorAll(".ant-alert, .ant-alert-info"))
          for (let i = 0; i < alerts.length; i += 1) {
            const alert = alerts[i]
            const text = String(alert.textContent || "").replace(/\s+/g, "")
            if (!text) continue
            if (text.includes("当前筛选")) {
              alert.remove()
            }
          }
        }

        let isApplyingTableDecor = false

        const aggregatePayColumnsInTable = () => {
          const wrappers = Array.from(document.querySelectorAll(".ant-table-wrapper"))
          const isPayHeader = text => {
            const compact = String(text || "").replace(/\s+/g, "")
            if (compact.includes("聚合支付")) return true
            if (!compact || !compact.includes("链接")) return false
            return compact.includes("支付宝") || compact.includes("微信") || compact.includes("云闪付")
          }

          for (let i = 0; i < wrappers.length; i += 1) {
            const wrapper = wrappers[i]
            const heads = getPrimaryHeaderCells(wrapper)

            const payColIndexes = []
            for (let h = 0; h < heads.length; h += 1) {
              if (isPayHeader(heads[h].textContent)) payColIndexes.push(h)
            }
            const rows = getPrimaryTableRows(wrapper)
            if (!payColIndexes.length && rows.length) {
              const firstCells = rows[0].querySelectorAll("td")
              for (let c = 0; c < firstCells.length; c += 1) {
                const cell = firstCells[c]
                const compactText = String(cell.textContent || "").replace(/\s+/g, "")
                if (
                  cell.querySelector("button.imt-pay-icon-only, a.imt-pay-icon-only, [data-imt-pay-mapped]") &&
                  !compactText.includes("一键复制") &&
                  !compactText.includes("二维码")
                ) {
                  payColIndexes.push(c)
                }
              }
            }
            if (!payColIndexes.length) continue

            for (let h = 0; h < payColIndexes.length; h += 1) {
              const idx = payColIndexes[h]
              const th = heads[idx]
              if (!th) continue
              if (th.textContent !== "") th.textContent = ""
              if (th.style.width !== "26px") th.style.width = "26px"
              if (th.style.minWidth !== "26px") th.style.minWidth = "26px"
              if (!th.classList.contains("imt-pay-col-compact")) th.classList.add("imt-pay-col-compact")
            }

            const colgroups = wrapper.querySelectorAll(".ant-table-content colgroup")
            for (let g = 0; g < colgroups.length; g += 1) {
              const cols = colgroups[g].querySelectorAll("col")
              for (let p = 0; p < payColIndexes.length; p += 1) {
                const colIndex = payColIndexes[p]
                const col = cols[colIndex]
                if (!col) continue
                if (col.style.width !== "26px") col.style.width = "26px"
                if (col.style.minWidth !== "26px") col.style.minWidth = "26px"
              }
            }

            for (let r = 0; r < rows.length; r += 1) {
              const row = rows[r]
              const cells = row.querySelectorAll("td")
              if (!cells.length) continue
              for (let p = 0; p < payColIndexes.length; p += 1) {
                const colIndex = payColIndexes[p]
                if (colIndex >= cells.length) continue
                const cell = cells[colIndex]
                if (!cell.classList.contains("imt-pay-col-compact")) {
                  cell.classList.add("imt-pay-col-compact")
                }
                const agg = cell.querySelector(".imt-pay-aggregate")
                if (agg) {
                  const nodes = Array.from(agg.childNodes)
                  while (agg.firstChild) agg.removeChild(agg.firstChild)
                  for (let n = 0; n < nodes.length; n += 1) cell.appendChild(nodes[n])
                  agg.remove()
                }
              }
            }
          }
        }

        const readTableOrderMetrics = () => {
          const wrappers = Array.from(document.querySelectorAll(".ant-table-wrapper"))
          let total = 0
          let pending = 0
          let delivering = 0
          let done = 0
          let canceled = 0

          for (let i = 0; i < wrappers.length; i += 1) {
            const wrapper = wrappers[i]
            const heads = getPrimaryHeaderCells(wrapper)
            const statusColIndex = heads.findIndex(th =>
              String(th.textContent || "").replace(/\s+/g, "").includes("状态")
            )
            if (statusColIndex < 0) continue

            const rows = getPrimaryTableRows(wrapper)
            for (let r = 0; r < rows.length; r += 1) {
              const row = rows[r]
              const cells = row.querySelectorAll("td")
              if (!cells.length || statusColIndex >= cells.length) continue
              total += 1
              const statusText = classifyStatusForMetrics(cells[statusColIndex].textContent)
              if (statusText === "待处理") {
                pending += 1
              } else if (statusText === "已接单") {
                delivering += 1
              } else if (statusText === "已完成") {
                done += 1
              } else if (statusText === "已取消") {
                canceled += 1
              }
            }
          }
          return { total, pending, delivering, done, canceled }
        }

        const renderOrderMetrics = () => {
          const totalEl = document.getElementById("mtKpiTotal")
          const pendingEl = document.getElementById("mtKpiPending")
          const deliveringEl = document.getElementById("mtKpiDelivering")
          const doneEl = document.getElementById("mtKpiDone")
          const canceledEl = document.getElementById("mtKpiCanceled")
          const timeEl = document.getElementById("mtKpiTime")
          if (!totalEl || !pendingEl || !deliveringEl || !doneEl || !canceledEl || !timeEl) return

          const m = latestPayloadMetrics || readTableOrderMetrics()
          totalEl.textContent = String(m.total)
          pendingEl.textContent = String(m.pending)
          deliveringEl.textContent = String(m.delivering)
          doneEl.textContent = String(m.done)
          canceledEl.textContent = String(m.canceled)

          const now = new Date()
          const p = num => String(num).padStart(2, "0")
          timeEl.textContent = `更新时间 ${p(now.getHours())}:${p(now.getMinutes())}:${p(
            now.getSeconds()
          )}`
        }

        let scanTimer = 0
        let metricsTimer = 0
        let remarkFilterTimer = 0
        let hintCleanupTimer = 0
        let signalResizeTimer = 0
        let tableDecorTimer = 0
        let lastDecorSignature = ""
        let lastDecorAt = 0
        const scheduleTableScan = () => {
          window.clearTimeout(scanTimer)
          scanTimer = window.setTimeout(scanRemarkFromTable, 180)
        }
        const scheduleMetricsRefresh = () => {
          window.clearTimeout(metricsTimer)
          metricsTimer = window.setTimeout(renderOrderMetrics, 180)
        }
        const scheduleRemarkFilter = () => {
          window.clearTimeout(remarkFilterTimer)
          remarkFilterTimer = window.setTimeout(() => {
            renderRemarkFilterControls()
            applyRemarkFilterToTables()
          }, 120)
        }
        const scheduleHintCleanup = () => {
          window.clearTimeout(hintCleanupTimer)
          hintCleanupTimer = window.setTimeout(removeCurrentFilterHint, 80)
        }
        const getTableDecorSignature = () => {
          const wrapper = document.querySelector(".query-container .ant-table-wrapper")
          if (!wrapper) return "no-wrapper"
          const rows = wrapper.querySelectorAll(".ant-table-tbody > tr")
          const rowCount = rows.length
          const firstRowKey =
            rowCount > 0 ? String(rows[0].getAttribute("data-row-key") || rows[0].textContent || "").slice(0, 80) : ""
          return `${rowCount}|${firstRowKey}`
        }
        const runTableDecor = () => {
          if (isApplyingTableDecor) return
          const now = Date.now()
          const sign = getTableDecorSignature()
          if (sign === lastDecorSignature && now - lastDecorAt < 1800) return
          isApplyingTableDecor = true
          try {
            remapCategoryInTable()
            remapStatusInTable()
            remapPayMethodButtons()
            removeQrcodeButtons()
            aggregatePayColumnsInTable()
            scheduleRemarkFilter()
            scheduleHintCleanup()
            lastDecorSignature = sign
            lastDecorAt = now
          } finally {
            isApplyingTableDecor = false
          }
        }
        const scheduleTableDecorRefresh = () => {
          window.clearTimeout(tableDecorTimer)
          tableDecorTimer = window.setTimeout(() => {
            runTableDecor()
          }, 700)
        }

        let lastPadTop = 0
        let padSyncTimer = 0
        const syncAppPaddingToShell = () => {
          const shell = document.getElementById("imt-waimai-shell")
          const app = document.getElementById("app")
          if (!shell || !app) return

          // Use the fixed shell's bottom position to compute required app offset.
          // This prevents KPI cards from overlaying the table on small screens.
          const rect = shell.getBoundingClientRect()
          const pad = Math.max(0, Math.ceil(rect.bottom + 12))
          if (Math.abs(pad - lastPadTop) < 2) return
          lastPadTop = pad
          document.documentElement.style.setProperty("--imt-app-pad-top", `${pad}px`)
        }
        const schedulePadSync = () => {
          window.clearTimeout(padSyncTimer)
          padSyncTimer = window.setTimeout(() => {
            window.requestAnimationFrame(syncAppPaddingToShell)
          }, 60)
        }

        let shellTimer = 0
        const setShellCollapsed = next => {
          const value = !!next
          if (value === shellCollapsed) return
          shellCollapsed = value
          document.documentElement.classList.toggle("imt-shell-collapsed", shellCollapsed)
          schedulePadSync()
        }
        const scheduleShellState = () => {
          window.clearTimeout(shellTimer)
          shellTimer = window.setTimeout(() => {
            const isMobile = window.matchMedia && window.matchMedia("(max-width: 720px)").matches
            if (!isMobile) {
              setShellCollapsed(false)
              return
            }

            // Collapse when user starts consuming the list (scrolls), expand back at top.
            const scrollY = window.scrollY || document.documentElement.scrollTop || 0
            if (scrollY <= 6) {
              setShellCollapsed(false)
              return
            }
            setShellCollapsed(true)
          }, 80)
        }

        const applyMobileColumnOptimize = () => {
          const isMobile = window.matchMedia && window.matchMedia("(max-width: 720px)").matches
          const wrappers = Array.from(
            document.querySelectorAll(".query-container .ant-table-wrapper")
          )
          if (!wrappers.length) return

          const shouldHideHeader = text => {
            const t = String(text || "").replace(/\s+/g, "")
            if (!t) return false
            // Keep core fields on mobile; hide "created time" and countdown to reduce width.
            if (t.includes("创建时间")) return true
            if (t.includes("倒计时")) return true
            return false
          }

          const hasPayCell = cell =>
            !!(
              cell &&
              (cell.querySelector &&
                cell.querySelector("button.imt-pay-icon-only, a.imt-pay-icon-only, [data-imt-pay-mapped]"))
            )

          for (let i = 0; i < wrappers.length; i += 1) {
            const wrapper = wrappers[i]
            const heads = getPrimaryHeaderCells(wrapper)
            if (!heads.length) continue
            const rows = getPrimaryTableRows(wrapper)
            const firstCells = rows.length ? rows[0].querySelectorAll("td") : null

            const hideIndexes = []
            for (let h = 0; h < heads.length; h += 1) {
              const th = heads[h]
              if (!th) continue
              const text = th.textContent
              if (shouldHideHeader(text)) hideIndexes.push(h)
            }

            // Optionally hide pay columns on very small screens to avoid ultra-wide tables.
            if (isMobile && firstCells && firstCells.length) {
              for (let c = 0; c < firstCells.length; c += 1) {
                if (hasPayCell(firstCells[c])) hideIndexes.push(c)
              }
            }

            const uniq = Array.from(new Set(hideIndexes)).filter(x => x >= 0)
            if (!uniq.length) continue

            const setVisible = (colIndex, visible) => {
              const th = heads[colIndex]
              if (th) th.style.display = visible ? "" : "none"

              for (let r = 0; r < rows.length; r += 1) {
                const tds = rows[r].querySelectorAll("td")
                if (tds[colIndex]) tds[colIndex].style.display = visible ? "" : "none"
              }

              const colgroups = wrapper.querySelectorAll(".ant-table-content colgroup")
              for (let g = 0; g < colgroups.length; g += 1) {
                const cols = colgroups[g].querySelectorAll("col")
                if (cols[colIndex]) cols[colIndex].style.display = visible ? "" : "none"
              }
            }

            // Apply: on mobile hide, on desktop show back.
            for (let h = 0; h < heads.length; h += 1) {
              const shouldHide = isMobile && uniq.includes(h)
              setVisible(h, !shouldHide)
            }
          }
        }

        const COL_ITEMS = [
          { id: "index", label: "序号", match: t => t.includes("序号") },
          { id: "phone", label: "手机号", match: t => t.includes("手机号") },
          { id: "category", label: "品类", match: t => t.includes("品类") || t.includes("车型") || t.includes("类型") },
          { id: "amount", label: "数量", match: t => t.includes("数量") },
          { id: "status", label: "状态", match: t => t.includes("状态") },
          { id: "created", label: "创建时间", match: t => t.includes("创建时间") },
          { id: "countdown", label: "倒计时", match: t => t.includes("倒计时") },
          { id: "remark", label: "备注", match: t => t.includes("备注") },
          { id: "actions", label: "操作", match: t => t.includes("操作") }
        ]

        const normalizeText = text => String(text || "").replace(/\s+/g, "")
        const isVisibleElement = el => {
          if (!el || !el.getBoundingClientRect) return false
          const rect = el.getBoundingClientRect()
          return rect.width > 0 && rect.height > 0
        }

        const loadColPrefs = () => {
          try {
            const raw = localStorage.getItem(COL_PREFS_KEY)
            if (!raw) return null
            const parsed = JSON.parse(raw)
            if (!parsed || typeof parsed !== "object") return null
            return parsed
          } catch (e) {
            return null
          }
        }
        const saveColPrefs = prefs => {
          try {
            localStorage.setItem(COL_PREFS_KEY, JSON.stringify(prefs || {}))
          } catch (e) {}
        }
        const getDefaultColPrefs = () => {
          const prefs = {}
          for (let i = 0; i < COL_ITEMS.length; i += 1) prefs[COL_ITEMS[i].id] = true
          return prefs
        }
        const findColItemByHeader = title => {
          const t = normalizeText(title)
          if (!t) return null
          for (let i = 0; i < COL_ITEMS.length; i += 1) {
            if (COL_ITEMS[i].match(t)) return COL_ITEMS[i]
          }
          return null
        }

        const getColumnTargetWrappers = () => {
          const scoped = Array.from(document.querySelectorAll(".query-container .ant-table-wrapper"))
          if (scoped.length) return scoped
          return Array.from(document.querySelectorAll(".ant-table-wrapper"))
        }

        const setTableColumnVisibleByIndex = (wrapper, colIndex, visible) => {
          const heads = getPrimaryHeaderCells(wrapper)
          const rows = getPrimaryTableRows(wrapper)
          const th = heads[colIndex]
          if (th) th.style.display = visible ? "" : "none"

          for (let r = 0; r < rows.length; r += 1) {
            const tds = rows[r].querySelectorAll("td")
            if (tds[colIndex]) tds[colIndex].style.display = visible ? "" : "none"
          }

          const colgroups = wrapper.querySelectorAll(".ant-table-content colgroup")
          for (let g = 0; g < colgroups.length; g += 1) {
            const cols = colgroups[g].querySelectorAll("col")
            if (cols[colIndex]) cols[colIndex].style.display = visible ? "" : "none"
          }
        }

        const applyUserColumnPrefs = () => {
          const prefs = loadColPrefs() || getDefaultColPrefs()
          const wrappers = getColumnTargetWrappers()
          if (!wrappers.length) return

          for (let i = 0; i < wrappers.length; i += 1) {
            const wrapper = wrappers[i]
            const heads = getPrimaryHeaderCells(wrapper)
            if (!heads.length) continue

            for (let h = 0; h < heads.length; h += 1) {
              const item = findColItemByHeader(heads[h] && heads[h].textContent)
              if (!item) continue
              const visible = prefs[item.id] !== false
              setTableColumnVisibleByIndex(wrapper, h, visible)
            }
          }
        }

        const applyUserColumnPrefsNow = () => {
          applyUserColumnPrefs()
          window.requestAnimationFrame(() => {
            applyUserColumnPrefs()
          })
          window.setTimeout(() => {
            applyUserColumnPrefs()
          }, 80)
        }

        const findDropdownAnchor = () => {
          const queryRoot = document.querySelector(".query-container") || document.body
          const buttons = Array.from(queryRoot.querySelectorAll("button, a, .ant-btn"))
          const clearTitles = new Set(["清空过滤", "清空筛选", "清空", "重置"])
          for (let i = 0; i < buttons.length; i += 1) {
            const txt = normalizeText(buttons[i].textContent)
            if (!clearTitles.has(txt)) continue
            if (!isVisibleElement(buttons[i])) continue
            return buttons[i]
          }
          return null
        }

        const findExportAnchorButton = () => {
          const queryRoot = document.querySelector(".query-container") || document.body
          const buttons = Array.from(queryRoot.querySelectorAll("button, a, .ant-btn"))
          for (let i = 0; i < buttons.length; i += 1) {
            const btn = buttons[i]
            if (!isVisibleElement(btn)) continue
            const text = normalizeText(btn.textContent || "")
            if (text.includes("导出表格")) return btn
          }

          for (let i = 0; i < buttons.length; i += 1) {
            const btn = buttons[i]
            if (!isVisibleElement(btn)) continue
            const text = normalizeText(btn.textContent || "")
            if (text.includes("导出")) return btn
          }
          return null
        }

        const placeColumnDropdownTrigger = () => {
          if (!colDropdownRoot) return
          const anchor = findExportAnchorButton()
          if (!anchor) {
            colDropdownRoot.style.display = "none"
            return
          }
          const item = anchor.closest(".ant-space-item, .ant-form-item, .ant-col") || anchor
          const parent = item && item.parentElement ? item.parentElement : null
          if (!parent) {
            colDropdownRoot.style.display = "none"
            return
          }
          colDropdownRoot.style.display = "inline-flex"
          if (colDropdownRoot.parentElement !== parent || item.nextSibling !== colDropdownRoot) {
            parent.insertBefore(colDropdownRoot, item.nextSibling)
          }
        }

        const scheduleColumnDropdownSync = () => {
          window.clearTimeout(colDropdownSyncTimer)
          colDropdownSyncTimer = window.setTimeout(() => {
            initColumnDropdownUI()
            applyUserColumnPrefsNow()
          }, 40)
        }

        const placeColumnDropdownMenu = () => {
          if (!colDropdownRoot || !colDropdownMenu) return
          const trigger = colDropdownRoot.querySelector(".imt-col-dropdown-trigger")
          if (!trigger || !trigger.getBoundingClientRect) return

          const rect = trigger.getBoundingClientRect()
          const vpW = window.innerWidth || document.documentElement.clientWidth || 360
          const vpH = window.innerHeight || document.documentElement.clientHeight || 640

          const desiredW = Math.min(240, Math.max(180, vpW - 24))
          colDropdownMenu.style.width = `${desiredW}px`

          const menuRect = colDropdownMenu.getBoundingClientRect()
          const menuW = menuRect.width || desiredW
          const menuH = menuRect.height || 280

          let left = rect.left
          if (left + menuW > vpW - 8) left = vpW - menuW - 8
          if (left < 8) left = 8

          let top = rect.bottom + 6
          if (top + menuH > vpH - 8) {
            top = Math.max(8, rect.top - menuH - 6)
          }

          colDropdownMenu.style.left = `${Math.round(left)}px`
          colDropdownMenu.style.top = `${Math.round(top)}px`
        }

        const initColumnDropdownUI = () => {
          const prefs = loadColPrefs() || getDefaultColPrefs()

          const renderMenu = menu => {
            menu.innerHTML = ""

            const title = document.createElement("div")
            title.className = "imt-col-dropdown-title"
            title.textContent = "显示项（勾选显示）"
            menu.appendChild(title)

            for (let i = 0; i < COL_ITEMS.length; i += 1) {
              const item = COL_ITEMS[i]
              const row = document.createElement("label")
              row.className = "imt-col-dropdown-item"

              const text = document.createElement("span")
              text.textContent = item.label

              const input = document.createElement("input")
              input.type = "checkbox"
              input.checked = prefs[item.id] !== false
              input.addEventListener("change", () => {
                prefs[item.id] = !!input.checked
                saveColPrefs(prefs)
                applyUserColumnPrefsNow()
              })

              row.appendChild(text)
              row.appendChild(input)
              menu.appendChild(row)
            }

            const actions = document.createElement("div")
            actions.className = "imt-col-dropdown-actions"

            const btnAll = document.createElement("button")
            btnAll.type = "button"
            btnAll.className = "imt-col-dropdown-mini"
            btnAll.textContent = "全选"
            btnAll.addEventListener("click", e => {
              e.preventDefault()
              for (let i = 0; i < COL_ITEMS.length; i += 1) prefs[COL_ITEMS[i].id] = true
              saveColPrefs(prefs)
              renderMenu(menu)
              applyUserColumnPrefsNow()
            })

            const btnReset = document.createElement("button")
            btnReset.type = "button"
            btnReset.className = "imt-col-dropdown-mini"
            btnReset.textContent = "重置"
            btnReset.addEventListener("click", e => {
              e.preventDefault()
              const def = getDefaultColPrefs()
              for (const k in def) prefs[k] = def[k]
              saveColPrefs(prefs)
              renderMenu(menu)
              applyUserColumnPrefsNow()
            })

            actions.appendChild(btnAll)
            actions.appendChild(btnReset)
            menu.appendChild(actions)
          }

          const ensureRoot = () => {
            if (colDropdownRoot && document.body.contains(colDropdownRoot)) return colDropdownRoot
            const existing = document.querySelector(".imt-col-dropdown[data-imt-col-dropdown='1']")
            if (existing) {
              colDropdownRoot = existing
              colDropdownMenu = existing.querySelector(".imt-col-dropdown-menu")
              return existing
            }

            const root = document.createElement("span")
            root.className = "imt-col-dropdown"
            root.setAttribute("data-imt-col-dropdown", "1")

            const trigger = document.createElement("button")
            trigger.type = "button"
            trigger.className = "imt-col-dropdown-trigger"
            trigger.textContent = "显示项 ▼"
            trigger.addEventListener("click", e => {
              e.preventDefault()
              e.stopPropagation()
              root.classList.toggle("open")
              if (root.classList.contains("open")) {
                renderMenu(menu)
                window.requestAnimationFrame(placeColumnDropdownMenu)
              }
            })

            const menu = document.createElement("div")
            menu.className = "imt-col-dropdown-menu"
            menu.addEventListener("click", e => {
              e.stopPropagation()
            })
            renderMenu(menu)

            root.appendChild(trigger)
            root.appendChild(menu)
            document.body.appendChild(root)
            colDropdownRoot = root
            colDropdownMenu = menu
            return root
          }

          const syncPosition = () => {
            ensureRoot()
            placeColumnDropdownTrigger()
          }

          syncPosition()
          if (colDropdownRoot && colDropdownRoot.classList.contains("open")) {
            window.requestAnimationFrame(placeColumnDropdownMenu)
          }

          if (!colDropdownUiBound) {
            colDropdownUiBound = true
            document.addEventListener("click", e => {
              if (!colDropdownRoot || !colDropdownRoot.classList.contains("open")) return
              const target = e.target
              if (colDropdownRoot.contains(target)) return
              colDropdownRoot.classList.remove("open")
            })
            window.addEventListener(
              "scroll",
              () => {
                if (colDropdownRoot && colDropdownRoot.classList.contains("open")) {
                  placeColumnDropdownMenu()
                }
              },
              true
            )
            window.addEventListener("resize", () => {
              scheduleColumnDropdownSync()
              if (colDropdownRoot && colDropdownRoot.classList.contains("open")) {
                window.requestAnimationFrame(placeColumnDropdownMenu)
              }
            })
          }
        }

        applyWatermark("外卖订单", "init")
        hookFetch()
        hookXHR()
        scheduleTableScan()
        scheduleMetricsRefresh()
        scheduleTableDecorRefresh()
        scheduleRemarkFilter()
        scheduleHintCleanup()
        schedulePadSync()
        applyMobileColumnOptimize()
        initColumnDropdownUI()
        applyUserColumnPrefsNow()
        scheduleShellState()

        // Ensure the dropdown appears even if the toolbar renders late.
        window.setTimeout(scheduleColumnDropdownSync, 300)
        window.setTimeout(scheduleColumnDropdownSync, 900)
        window.setTimeout(scheduleColumnDropdownSync, 1600)

        document.addEventListener("click", e => {
          if (!remarkFilterMenu || remarkFilterMenu.style.display === "none") return
          const target = e.target
          if (
            remarkFilterMenu.contains(target) ||
            (target && target.closest && target.closest(".imt-remark-filter-trigger"))
          ) {
            return
          }
          hideRemarkFilterMenu()
        })
        window.addEventListener("scroll", hideRemarkFilterMenu, true)

        window.__IMT_QUERY_WATERMARK_DEMO = remark => runDemoWatermark(remark)
        window.__IMT_QUERY_WATERMARK_RESET = () => applyWatermark("外卖订单", "demo-reset")
        window.__IMT_QUERY_WATERMARK_REVEAL = enabled => {
          const node = document.documentElement
          const on =
            typeof enabled === "boolean"
              ? enabled
              : !node.classList.contains("imt-forensic-reveal")
          node.classList.toggle("imt-forensic-reveal", on)
          return on
        }

        try {
          const params = new URLSearchParams(location.search || "")
          if (params.has("wmDemo")) {
            const value = params.get("wmDemo")
            runDemoWatermark(value || "张三")
          }
        } catch (e) {}

        const hasTableMutation = mutations => {
          for (let i = 0; i < mutations.length; i += 1) {
            const m = mutations[i]
            const target = m.target
            if (target && target.nodeType === 1) {
              if (
                target.closest &&
                (target.closest(".ant-table-wrapper") || target.closest(".query-container"))
              ) {
                return true
              }
            }
            const nodes = m.addedNodes
            for (let j = 0; j < nodes.length; j += 1) {
              const n = nodes[j]
              if (!n || n.nodeType !== 1) continue
              if (
                (n.matches && n.matches(".ant-table-wrapper, .ant-table, .ant-table-tbody, .ant-table-row")) ||
                (n.querySelector &&
                  n.querySelector(".ant-table-wrapper, .ant-table, .ant-table-tbody, .ant-table-row"))
              ) {
                return true
              }
            }
          }
          return false
        }

        const observer = new MutationObserver(mutations => {
          if (isApplyingTableDecor) return
          if (!hasTableMutation(mutations)) return
          scheduleTableScan()
          scheduleMetricsRefresh()
          scheduleTableDecorRefresh()
          scheduleHintCleanup()
          schedulePadSync()
          applyMobileColumnOptimize()
          initColumnDropdownUI()
          applyUserColumnPrefsNow()
          scheduleShellState()
        })
        observer.observe(document.body, { childList: true, subtree: true })

        window.addEventListener("resize", () => {
          scheduleMetricsRefresh()
          schedulePadSync()
          applyMobileColumnOptimize()
          initColumnDropdownUI()
          applyUserColumnPrefsNow()
          scheduleShellState()
          if (!lastSignalCode && !lastFastCode) return
          window.clearTimeout(signalResizeTimer)
          signalResizeTimer = window.setTimeout(() => {
            if (lastSignalCode) drawSignalWatermark(lastSignalCode)
            if (lastFastCode) drawFastSignalWatermark(lastFastCode)
          }, 120)
        })

        if (window.visualViewport && window.visualViewport.addEventListener) {
          window.visualViewport.addEventListener("resize", () => {
            schedulePadSync()
            scheduleShellState()
          })
        }

        window.addEventListener(
          "scroll",
          () => {
            scheduleShellState()
          },
          { passive: true }
        )
      })()
